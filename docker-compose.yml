version: '3.8'

services:
  web:
    build: .
    container_name: crm_web
    ports:
      - "8006:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=training_crm
      - DB_USER=crm_user
      - DB_PASS=crm_password
      - APP_DEBUG=true
    depends_on:
      - db

  db:
    image: mysql:8.4
    container_name: crm_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=training_crm
      - MYSQL_USER=crm_user
      - MYSQL_PASSWORD=crm_password
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
